<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Kolones Finance App</title>
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav">
        <div class="about">
          <img
            src="../assets/svg/attention-exclamation-notification-svgrepo-com.svg"
            alt="products"
          />
          <a href="#about" class="nav-link">About</a>
        </div>

        <div class="document">
          <img
            src="../assets/svg/direction-right-location-svgrepo-com.svg"
            alt="products"
          />
          <a href="#document" class="nav-link">Document</a>
        </div>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-title-block">
        <h1 class="hero-title">
          <span class="title-line">KOLONES</span>
          <span class="title-line">FINANCE</span>
          <span class="title-line title-line--inline">
            APP
            <a href="#try" class="btn-try">Try</a>
          </span>
        </h1>
      </div>
      <div class="loader-title-block">
        <div class="eye-lid">
          <div class="eye">
            <div class="cornea">
              <div class="white-pupil"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="scroll-indicator">
        <span>scroll</span>
        <div class="scroll-line"></div>
      </div>
    </main>
