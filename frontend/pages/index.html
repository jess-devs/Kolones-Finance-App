<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Kolones Finance App</title>
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav">
        <div class="about" id="about-right">
          <img
            src="../assets/svg/attention-exclamation-notification-svgrepo-com.svg"
            alt="productos"
          />
          <a href="#about" class="nav-link">Acerca de</a>
        </div>

        <div class="document">
          <img
            src="../assets/svg/direction-right-location-svgrepo-com.svg"
            alt="productos"
          />
          <a
            href="https://github.com/jess-devs/Kolones-Finance-App"
            class="nav-link"
            >GitHub</a
          >
        </div>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-title-block">
        <h1 class="hero-title">
          <span class="title-line">KOLONES</span>
          <span class="title-line">FINANCE</span>
          <span class="title-line title-line--inline">
            APP
            <a href="#try" class="btn-try">Probar</a>
          </span>
        </h1>
      </div>
      <div class="loader-title-block">
        <div class="eye-lid">
          <div class="eye">
            <div class="cornea">
              <div class="white-pupil"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="scroll-indicator">
        <span>desliza</span>
        <div class="scroll-line"></div>
      </div>
    </main>

    <section id="about" class="about-section fade-in">
      <div class="about-inner">
        <span class="about-label">Acerca de</span>
        <div class="about-content">
          <h2 class="about-heading">KOLONES<br />FINANCE APP</h2>
          <div class="about-body">
            <p>
              Tu aliado para gestionar, visualizar y controlar tus finanzas
              personales. Sin complicaciones, sin ruido.
            </p>
            <ul class="about-pillars">
              <li>Stepbro Hackathon — Edición Finance App.</li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <script>
      const observer = new IntersectionObserver(
        (entries) =>
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("visible");
          }),
        { threshold: 0.15 },
      );
      document
        .querySelectorAll(".fade-in")
        .forEach((el) => observer.observe(el));
    </script>
  </body>
</html>
